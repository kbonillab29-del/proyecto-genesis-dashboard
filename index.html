<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proyecto Génesis — Avance de digitalización</title>
<style>
/* ============================================================
   PROYECTO GÉNESIS — Dashboard de avance de digitalización
   Token system
   ============================================================ */
:root{
  --bg: #eef1f4;
  --surface: #ffffff;
  --surface-2: #eef2f5;
  --ink: #16232b;
  --ink-soft: #52626c;
  --line: #d9e1e6;
  --line-soft: #e8edf0;

  --brand: #123a5c;
  --brand-dark: #0b2740;
  --brand-tint: #e1ebf1;

  --accent: #1fb6cf;
  --accent-dark: #128fa3;
  --accent-tint: #dcf5f8;

  --ok: #2f9e58;
  --ok-tint: #e2f4e8;
  --warn: #e1a339;
  --warn-dark: #96731f;
  --warn-tint: #fbeed2;
  --bad: #c1443d;
  --bad-tint: #fbe4e2;

  --sky: #2f8fc7;
  --violet: #4a6fa5;

  --radius: 10px;
  --radius-lg: 16px;
  --shadow: 0 1px 2px rgba(14,58,92,.06), 0 6px 20px -10px rgba(14,58,92,.18);

  --font-display: "Space Grotesk", "IBM Plex Sans", sans-serif;
  --font-body: "IBM Plex Sans", "Segoe UI", sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, monospace;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{
  font-family:var(--font-display);
  font-weight:600;
  margin:0;
  color:var(--brand-dark);
  letter-spacing:-0.01em;
}
button{font-family:var(--font-body);}
table{border-collapse:collapse;width:100%;}
a{color:var(--brand);}
::selection{background:var(--accent-tint);}

/* focus visibility */
a:focus-visible, button:focus-visible, select:focus-visible, input:focus-visible{
  outline:2px solid var(--accent-dark);
  outline-offset:2px;
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
}

/* ============================================================
   Shell layout
   ============================================================ */
.app-shell{
  display:grid;
  grid-template-columns:232px 1fr;
  min-height:100vh;
}

/* --- Sidebar --- */
.sidebar{
  background:var(--brand-dark);
  color:#eaf3f2;
  padding:22px 16px;
  display:flex;
  flex-direction:column;
  gap:22px;
  position:sticky;
  top:0;
  height:100vh;
}
.brand-sub2{
  font-size:10px;
  color:#6f97ab;
  text-transform:uppercase;
  letter-spacing:.06em;
  margin-top:2px;
}
.brand-logo{
  width:30px;height:30px;flex:none;border-radius:50%;
  background:rgba(255,255,255,.06);
  border:1.6px solid var(--accent);
  cursor:pointer;
  position:relative;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background-image:url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 26 26'%3E%3Cpath d='M2 13c2-4 4-6 6-2s4 6 6 2 4-6 6-2' stroke='%231fb6cf' stroke-width='1.8' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:center;background-size:60%;
}
.brand-logo img, .brand-logo video{
  width:100%;height:100%;object-fit:cover;
}
.brand-logo::after{
  content:'✎';
  position:absolute; inset:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(11,39,64,.72);
  color:#fff; font-size:11px;
  opacity:0; transition:opacity .15s;
}
.brand-logo:hover::after{opacity:1;}
.brand-logo .logo-remove{
  position:absolute; top:-3px; right:-3px;
  width:15px;height:15px;border-radius:50%;
  background:var(--bad); color:#fff; font-size:10px; line-height:15px; text-align:center;
  display:none; z-index:2;
}
.brand-logo.has-custom:hover .logo-remove{display:block;}

.brand{
  display:flex;
  flex-direction:column;
  gap:2px;
  padding:0 6px;
}
.brand .mark{
  display:flex;
  align-items:center;
  gap:8px;
}
.brand .mark svg{flex:none;}
.brand-name{
  font-family:var(--font-display);
  font-size:17px;
  font-weight:700;
  color:#fff;
  letter-spacing:-0.01em;
}
.brand-sub{
  font-size:10.5px;
  color:#9fc3c0;
  text-transform:uppercase;
  letter-spacing:.08em;
  line-height:1.4;
}
nav.tabs{display:flex;flex-direction:column;gap:3px;margin-top:6px;}
nav.tabs button{
  all:unset;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:8px;
  font-size:13px;
  color:#c7dedc;
  transition:background .15s, color .15s;
}
nav.tabs button svg{flex:none;opacity:.85;}
nav.tabs button:hover{background:rgba(255,255,255,.06); color:#fff;}
nav.tabs button.active{
  background:var(--accent);
  color:#06303a;
  font-weight:600;
}
nav.tabs button.active svg{opacity:1;}

.sidebar-foot{
  margin-top:auto;
  font-size:11px;
  color:#7fa6a3;
  padding:0 6px;
  border-top:1px solid rgba(255,255,255,.08);
  padding-top:12px;
  display:flex;
  flex-direction:column;
  gap:4px;
}
.sidebar-foot b{color:#cfe4e2;}

/* --- Main --- */
.main{
  padding:0;
  min-width:0;
}
.topbar{
  background:var(--surface);
  border-bottom:1px solid var(--line);
  padding:16px 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
  position:sticky;
  top:0;
  z-index:5;
}
.topbar h1{font-size:19px;}
.topbar .desc{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
.topbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

.btn{
  all:unset;
  cursor:pointer;
  font-size:12.5px;
  font-weight:600;
  padding:8px 13px;
  border-radius:8px;
  display:inline-flex;
  align-items:center;
  gap:6px;
  border:1px solid transparent;
  white-space:nowrap;
}
.btn-primary{background:var(--brand); color:#fff;}
.btn-primary:hover{background:var(--brand-dark);}
.btn-accent{background:var(--accent); color:#06303a;}
.btn-accent:hover{background:var(--accent-dark); color:#fff;}
.btn-ghost{background:var(--surface-2); color:var(--brand-dark); border-color:var(--line);}
.btn-ghost:hover{background:var(--brand-tint);}
.btn-sm{padding:6px 10px;font-size:11.5px;}
.btn[disabled]{opacity:.45;cursor:not-allowed;}

.content{
  padding:22px 28px 60px;
  max-width:1400px;
}
.view{display:none;}
.view.active{display:block;}

/* ============================================================
   Signature element: instrument-trace divider
   (nod to the barograma / heliograma pen recorders being digitized)
   ============================================================ */
.trace-divider{
  width:100%;
  height:22px;
  margin:26px 0 18px;
  opacity:.9;
}
.trace-divider path{
  fill:none;
  stroke:var(--accent);
  stroke-width:1.6;
  stroke-linecap:round;
  stroke-dasharray:900;
  stroke-dashoffset:900;
  animation:trace-draw 1.6s ease forwards;
}
@keyframes trace-draw{ to { stroke-dashoffset:0; } }

.section-head{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}
.section-head .eyebrow{
  font-family:var(--font-mono);
  font-size:10.5px;
  letter-spacing:.09em;
  text-transform:uppercase;
  color:var(--accent-dark);
  font-weight:600;
}
.section-head h2{font-size:17px;margin-top:2px;}

/* ============================================================
   Cards / grid
   ============================================================ */
.grid{display:grid;gap:16px;}
.grid-kpi{grid-template-columns:repeat(5, 1fr);}
.grid-2{grid-template-columns:1.3fr 1fr;}
.grid-2b{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:1fr 1fr 1fr;}
.grid-4{grid-template-columns:repeat(4,1fr);}
@media (max-width:1150px){
  .grid-kpi{grid-template-columns:repeat(2,1fr);}
  .grid-2, .grid-2b, .grid-3, .grid-4{grid-template-columns:1fr;}
}

.card{
  background:var(--surface);
  border:1px solid var(--line-soft);
  border-radius:var(--radius-lg);
  padding:16px 18px;
  box-shadow:var(--shadow);
  min-width:0;
}
.card h3{font-size:12.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);font-weight:600;font-family:var(--font-body);}
.card .card-title-row{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px;}

.kpi{padding:16px 16px 14px;}
.kpi .num{
  font-family:var(--font-display);
  font-size:28px;
  font-weight:700;
  color:var(--brand-dark);
  line-height:1.1;
}
.kpi .label{font-size:11.5px;color:var(--ink-soft);margin-top:4px;}
.kpi .num.accent{color:var(--accent-dark);}
.kpi .num.warn{color:var(--warn-dark);}
.kpi.warn-border{border-left:4px solid var(--warn);}
.kpi.ok-border{border-left:4px solid var(--ok);}

/* ============================================================
   Charts (hand-built SVG, no external deps)
   ============================================================ */
.chart-wrap{width:100%;overflow-x:auto;}
.bar-row{display:flex;align-items:center;gap:10px;margin:9px 0;}
.bar-row .bar-label{width:112px;font-size:12px;color:var(--ink-soft);flex:none;}
.bar-track{flex:1;background:var(--surface-2);border-radius:6px;height:16px;overflow:hidden;display:flex;}
.bar-seg{height:100%;}
.bar-row .bar-value{width:64px;text-align:right;font-family:var(--font-mono);font-size:11.5px;color:var(--ink-soft);flex:none;}

.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--ink-soft);margin-bottom:8px;}
.legend .dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;}

.year-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;}
.year-cell{
  background:var(--surface-2);
  border-radius:7px;
  padding:8px 4px;
  text-align:center;
  border:1px solid var(--line-soft);
}
.year-cell .y{font-size:10.5px;color:var(--ink-soft);}
.year-cell .n{font-family:var(--font-mono);font-weight:600;font-size:13px;color:var(--brand-dark);}
.year-cell.empty{opacity:.35;}

table.data-table{font-size:12.5px;}
table.data-table th{
  text-align:left;
  font-size:10.5px;
  text-transform:uppercase;
  letter-spacing:.03em;
  color:var(--ink-soft);
  border-bottom:1px solid var(--line);
  padding:7px 8px;
  position:sticky;
  top:0;
  background:var(--surface);
}
table.data-table td{padding:7px 8px;border-bottom:1px solid var(--line-soft);}
table.data-table tr:hover td{background:var(--surface-2);}
table.data-table td.num, table.data-table th.num{text-align:right;font-family:var(--font-mono);}
.table-scroll{max-height:360px;overflow:auto;border:1px solid var(--line-soft);border-radius:10px;}

.pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;
}
.pill-ok{background:var(--ok-tint);color:#1c7a41;}
.pill-warn{background:var(--warn-tint);color:#96731f;}
.pill-bad{background:var(--bad-tint);color:#a3312b;}
.pill-neutral{background:var(--surface-2);color:var(--ink-soft);}

/* ============================================================
   Map (schematic scatter, no external tiles/CDN)
   ============================================================ */
.map-wrap{position:relative;background:linear-gradient(180deg,#eaf4f3,#dcecec);border-radius:12px;border:1px solid var(--line-soft);overflow:hidden;}
.map-wrap svg{display:block;width:100%;height:auto;}
.map-caption{font-size:10.5px;color:var(--ink-soft);margin-top:6px;}
.station-dot{cursor:pointer;stroke:#fff;stroke-width:1.2;transition:r .12s;}
.station-dot:hover{stroke-width:2;}
.map-tooltip{
  position:absolute;pointer-events:none;
  background:var(--brand-dark);color:#fff;
  font-size:11.5px;padding:7px 10px;border-radius:8px;
  transform:translate(-50%,-115%);
  box-shadow:0 8px 20px rgba(0,0,0,.25);
  white-space:nowrap;
  z-index:6;
}
.map-tooltip b{color:var(--accent);}

/* ============================================================
   Filters
   ============================================================ */
.filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.filter-field{display:flex;flex-direction:column;gap:5px;min-width:190px;}
.filter-field label{font-size:11px;color:var(--ink-soft);font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
select, input[type=text], input[type=number]{
  font-family:var(--font-body);
  font-size:13px;
  padding:8px 10px;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--surface);
  color:var(--ink);
}
select:focus, input:focus{border-color:var(--brand);}

/* ============================================================
   Faltantes view
   ============================================================ */
.missing-list{display:flex;flex-direction:column;gap:8px;}
.missing-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;border:1px solid var(--line-soft);border-radius:9px;background:var(--surface-2);
  font-size:12.5px;gap:10px;flex-wrap:wrap;
}
.missing-item .tag{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);}

/* ============================================================
   Registrar avance (formulario en cascada)
   ============================================================ */
.stepper{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.step{
  display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--ink-soft);
  padding:6px 12px;border-radius:99px;background:var(--surface-2);border:1px solid var(--line-soft);
}
.step .n{
  width:17px;height:17px;border-radius:50%;background:var(--line);color:#fff;font-size:10px;
  display:flex;align-items:center;justify-content:center;font-weight:700;flex:none;
}
.step.done{background:var(--ok-tint);color:#1c7a41;}
.step.done .n{background:var(--ok);}
.step.active{background:var(--accent-tint);color:var(--accent-dark);font-weight:700;}
.step.active .n{background:var(--accent);}

.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media (max-width:900px){.form-grid{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:11.5px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;}
.field .hint{font-size:11px;color:var(--ink-soft);opacity:.8;}

.status-choice{display:flex;gap:8px;flex-wrap:wrap;}
.status-choice label{
  display:flex;align-items:center;gap:6px;
  padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:12.5px;cursor:pointer;
  font-weight:500;color:var(--ink-soft);
}
.status-choice input{accent-color:var(--brand);}
.status-choice label.sel-ok{border-color:var(--ok);}
.status-choice label.sel-warn{border-color:var(--warn);}
.status-choice label.sel-bad{border-color:var(--bad);}

.pct-choice{display:flex;gap:6px;flex-wrap:wrap;}
.pct-choice button{
  all:unset;cursor:pointer;padding:7px 13px;border-radius:8px;border:1px solid var(--line);
  font-size:12.5px;font-weight:600;color:var(--ink-soft);
}
.pct-choice button.sel{background:var(--brand);border-color:var(--brand);color:#fff;}

.toast{
  position:fixed;bottom:22px;right:22px;
  background:var(--brand-dark);color:#fff;padding:12px 18px;border-radius:10px;
  font-size:13px;box-shadow:0 12px 30px rgba(0,0,0,.25);
  display:flex;align-items:center;gap:10px;
  transform:translateY(20px);opacity:0;pointer-events:none;
  transition:transform .25s, opacity .25s;
  z-index:50;
}
.toast.show{transform:translateY(0);opacity:1;}
.toast.err{background:var(--bad);}

.pending-table-wrap{margin-top:18px;}
.empty-note{
  padding:20px;text-align:center;color:var(--ink-soft);font-size:12.5px;
  border:1px dashed var(--line);border-radius:10px;background:var(--surface-2);
}

/* ============================================================
   Print / PDF report styles
   ============================================================ */
.print-only{display:none;}
@media print{
  .sidebar, .topbar, .filters, .btn, .stepper, .form-grid, .pending-table-wrap, .no-print{display:none !important;}
  body{background:#fff;}
  .app-shell{display:block;}
  .content{padding:0;max-width:none;}
  .view{display:none !important;}
  .view.printing{display:block !important;}
  .print-only{display:block !important;}
  .card{box-shadow:none;border:1px solid #ccc;break-inside:avoid;}
}
/* ============================================================
   Manual — árbol de capítulos
   ============================================================ */
.manual-layout{display:grid;grid-template-columns:280px 1fr;gap:16px;align-items:start;}
@media (max-width:900px){.manual-layout{grid-template-columns:1fr;}}
.chapter-tree{display:flex;flex-direction:column;gap:2px;max-height:560px;overflow:auto;}
.chapter-node{display:flex;flex-direction:column;}
.chapter-row{
  display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:7px;cursor:pointer;
  font-size:12.5px;color:var(--ink);
}
.chapter-row:hover{background:var(--surface-2);}
.chapter-row.active{background:var(--brand-tint);color:var(--brand-dark);font-weight:700;}
.chapter-row .twisty{width:14px;flex:none;color:var(--ink-soft);font-size:10px;text-align:center;}
.chapter-row .chapter-num{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-soft);flex:none;}
.chapter-children{margin-left:18px;border-left:1px dashed var(--line);padding-left:6px;}
.chapter-actions-mini{display:none;gap:3px;margin-left:auto;}
.chapter-row:hover .chapter-actions-mini{display:flex;}
.chapter-actions-mini button{
  all:unset;cursor:pointer;font-size:10px;color:var(--ink-soft);padding:2px 5px;border-radius:4px;
}
.chapter-actions-mini button:hover{background:var(--line-soft);color:var(--ink);}

.manual-editor{display:flex;flex-direction:column;gap:10px;min-height:400px;}
.manual-editor textarea{
  width:100%;min-height:340px;font-family:var(--font-body);font-size:13.5px;line-height:1.6;
  padding:14px;border:1px solid var(--line);border-radius:10px;resize:vertical;
}
.manual-view{
  font-size:13.5px;line-height:1.7;color:var(--ink);
}
.manual-view h3, .manual-view h4{margin-top:16px;margin-bottom:6px;}
.manual-view ul{margin:8px 0;padding-left:20px;}
.manual-view p{margin:8px 0;}
.manual-empty{padding:40px 20px;text-align:center;color:var(--ink-soft);}
.manual-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.manual-breadcrumb{font-size:11.5px;color:var(--ink-soft);font-family:var(--font-mono);}
.new-chapter-form{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.new-chapter-form input{flex:1;min-width:160px;}

/* ============================================================
   Reparto de trabajo entre el equipo
   ============================================================ */
.person-card{display:flex;flex-direction:column;gap:8px;}
.person-card .person-head{display:flex;align-items:center;justify-content:space-between;}
.person-card .person-count{
  font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);
  background:var(--surface-2);padding:2px 8px;border-radius:99px;
}
.assign-item{
  display:flex;align-items:flex-start;gap:7px;
  padding:8px 9px;border-radius:8px;background:var(--surface-2);border:1px solid var(--line-soft);
  font-size:11.5px;line-height:1.4;
}
.assign-item input{margin-top:2px;flex:none;accent-color:var(--brand);}
.assign-item.checked{opacity:.55;text-decoration:line-through;}
.assign-item .cat-tag{
  font-family:var(--font-mono);font-size:9.5px;color:var(--ink-soft);text-transform:uppercase;
  flex:none;background:var(--line-soft);padding:1px 5px;border-radius:4px;
}
.person-list{display:flex;flex-direction:column;gap:6px;max-height:420px;overflow:auto;}

.report-letterhead{
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:3px solid var(--brand-dark);padding-bottom:14px;margin-bottom:20px;
}
.report-letterhead .title{font-family:var(--font-display);font-size:20px;color:var(--brand-dark);font-weight:700;}
.report-letterhead .sub{font-size:11.5px;color:var(--ink-soft);}
.report-meta{font-size:11.5px;color:var(--ink-soft);margin-bottom:14px;}

</style>
</head>
<body>
<div class="app-shell">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar no-print">
    <div class="brand">
      <div class="mark">
